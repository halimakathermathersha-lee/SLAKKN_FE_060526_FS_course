<html>
    <head>
    <title>Volunteer Registration Form</title>
</head>

<body>

    <center>
    <h1 >Volunteer Registration Form</h1>

    <form>

        Full Name:
        <input type="text" placeholder="Enter your name" required>
        <br><br>

        Email:
        <input type="email" placeholder="Enter email" required>
        <br><br>

        Password:
        <input type="password" min="8" placeholder="Enter password" required>
        <br><br>

        Phone Number:
        <input type="tel" minlength="10" maxlength="10" placeholder="Enter phone number" required>
        <br><br>

        Age:
        <input type="number" min="18" max="60" placeholder="Enter age" required>
        <br><br>

        Date of Birth:
        <input type="date" required>
        <br><br>

        Gender:
        <input type="radio" name="gender" required> Male
        <input type="radio" name="gender" required> Female
        <br><br>

        Skills:<br>
        <input type="checkbox"> Teaching<br>
        <input type="checkbox"> Communication<br>
        <input type="checkbox"> Management<br>
        <br><br>

        Available Time:
        <input type="time">
        <br><br>

        Favorite Color:
        <input type="color">
        <br><br>

        Upload Pic:
        <input type="file" >
        <br><br>

        Address:
        <br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>

        Why do you want to volunteer?
        <br>
        <textarea rows="4" cols="30"></textarea>
        <br><br>

        <textarea rows="4" cols="30" readonly>If You Okay with all the rules and regulations, agree with this volunteer work means check all the details and click register</textarea>


        <input type="submit" value="Register">

    </form>

    </center>
</body>
    </head>
</html>
