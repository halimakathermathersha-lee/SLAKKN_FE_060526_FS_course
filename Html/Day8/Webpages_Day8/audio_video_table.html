<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>

<body>
    <center>
        <h1>Smiley Bakery</h1>
    </center>
    <h2>How To Bake Yourself</h2>
    <h3>For Audio</h3>

    <table border="2">

        <tr>

            <th>Autoplay</th>
            <th>Muted</th>
            <th>Loop</th>

        </tr>

        <tr>

            <td>

                <audio controls autoplay>

                    <source src="../../../Html/Assets/Audio/1.mp3" type="audio/mp3">

                </audio>

            </td>

            <td>

                <audio controls muted>

                    <source src="../../../Html/Assets/Audio/1.mp3" type="audio/mp3">

                </audio>

            </td>

            <td>

                <audio controls loop>

                    <source src="../../../Html/Assets/Audio/1.mp3" type="audio/mp3">

                </audio>

            </td>

        </tr>

    </table>

    <br><br>


    <h2>For Video</h2>

    <table border="2">

        <tr>

            <th>Poster</th>

            <td>

                <video width="400" controls poster="../../Html/Assets/img/bakery/1.jpg">

                    <source src="../../../Html/Assets/Video/videoplayback.mp4" type="video/mp4">

                </video>

            </td>

        </tr>


        <tr>

            <th>Autoplay</th>

            <td>

                <video width="400" controls autoplay>

                    <source src="../../../Html/Assets/Video/videoplayback.mp4" type="video/mp4">

                </video>

            </td>

        </tr>


        <tr>

            <th>Muted</th>

            <td>

                <video width="400" controls muted>

                    <source src="../../../Html/Assets/Video/videoplayback.mp4" type="video/mp4">

                </video>

            </td>

        </tr>


        <tr>

            <th>Loop</th>

            <td>

                <video width="400" controls loop>

                    <source src="../../../Html/Assets/Video/videoplayback.mp4" type="video/mp4">

                </video>

            </td>

        </tr>

    </table>
</body>

</html>
