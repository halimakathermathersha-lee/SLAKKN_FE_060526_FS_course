<html>

<head>
    <title>
           Resume Building Form
    </title>
</head>

<body>
    <section>
        <div>
            <form>

                <h1>Resume Building Form</h1>

                <fieldset>

                    <legend>Personal Details</legend>

                    <label>Name :</label>

                    <input type="text" placeholder="In caps" required>

                    <br><br>

                    

                <label>Upload Resume :</label>

                <input type="file"><br><br>

                    <label>Email :</label>

                    <input type="email" placeholder="Enter email" required>

                    <br><br>

                    <label>Phone :</label>

                    <input type="tel" required><br><br>

                    <label>About Yourself :</label><br>
                    <textarea rows="4" cols="30"></textarea><br><br>

                    <label>LinkedIn :</label>
                    <input type="text" placeholder="Enter Link" ><br>

                    
                </fieldset>

                <br>

                <fieldset>

                    <legend>Education Details</legend>

                    <label>College :</label>

                    <input type="text">

                    <br><br>

                    <label>Degree :</label>

                    <input type="text">

                    <br><br>

                    <label>Passing Year :</label>

                    <input type="number">

                </fieldset>

                <br>

                <fieldset>

                    <legend>Skills</legend>

                    <textarea rows="4" cols="30"></textarea>

                </fieldset>

                <br>

                <fieldset>

                    <legend>Experience :</legend>

                    <textarea rows="4" cols="30"></textarea>

                    </fieldset><br>
                    <fieldset>
                    <legend>Certificate and Achiements :</legend>
                    <textarea rows="4" cols="30"></textarea>

                </fieldset>

                

                <br><br>

                <input type="submit" value="Submit Resume">

            </form>
        </div>
    </section>
</body>

</html>
