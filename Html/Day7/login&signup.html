<html>

<head>
    <title>
        Login and signup page
    </title>
</head>

<body>
    <form>

        <h2>Login Form</h2>

        <label>Username :</label>

        <input type="text" required placeholder="Enter Username" minlength="3" maxlength="15">

        <br><br>

        <label>Password :</label>

        <input type="password" required placeholder="Enter Password" minlength="6" maxlength="12">

        <br><br>

        <input type="submit" value="Login">

        <hr>

        <h2>Signup Form</h2>

        <label>Full Name :</label>

        <input type="text" required placeholder="Enter Name">

        <br><br>

        <label>Email :</label>

        <input type="email" required placeholder="Enter Email">

        <br><br>

        <label>Password :</label>

        <input type="password" required minlength="6" maxlength="15" placeholder="Create Password">

        <br><br>

        <input type="submit" value="Signup">

    </form>
</body>

</html>
