<html>

<head>
    <title>
        College Admiision
    </title>
</head>

<body>
    <form>

         <hr>
                <center>
                    <h1> College Admission Form</h1>
                </center>
                <hr><br>

        <fieldset>

            <legend>
                College Admission Form
            </legend>

            <label>Name :</label>

            <input type="text" placeholder="Your Answer" required>

            <br><br>

            <label>Email :</label>

            <input type="email" placeholder="Your Answer" required>

            <br><br>

            <label>Password :</label>

            <input type="password" placeholder="Your Answer" required>

            <br><br>

            <label>mobile Number :</label>

            <input type="number" minlength="10" maxlength="10" placeholder="Your Answer" required>

            <br><br>

            <label>Gender :</label>

                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                    <br><br>

                     <label>State :</label>

                    <select required>

                        <option selected disabled>
                            choose
                        </option>

                        <option>Delhi</option>
                        <option>Tamil Nadu</option>
                        <option>Kerala</option>

                    </select><br><br>

                    <label>
                        Upload Your Pic: 
                    </label>
                    <input type="file" ><br><br>
                    <label>Enter Your 10th mark</label>
                    <input type="number" placeholder="Enter mark" required><br><br>
                    <label>Enter Your 12th mark</label>
                    <input type="number" placeholder="Enter mark" required><br><br>

            <label>Course :</label>

            <select>

                <optgroup label="UG Courses">

                    <option>BCA</option>
                    <option>BSc CS</option>
                    <option>BCom</option>

                </optgroup>

                <optgroup label="PG Courses">

                    <option>MCA</option>
                    <option>MSc</option>

                </optgroup>

            </select><br><br>

            
                    <label>Address :</label><br>

                    <textarea rows="4" cols="30" placeholder="Enter Address">
                    </textarea>


            <br><br>

            <input type="submit" value="Apply">

        </fieldset>

    </form>
</body>

</html>
