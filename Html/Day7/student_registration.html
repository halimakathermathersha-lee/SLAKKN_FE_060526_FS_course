<html>

<head>
    <title>
        Student Registration
    </title>
</head>

<body>
    <section>
        <div>
            <form>

                <hr>
                <center>
                    <h1>Student Registration Form</h1>
                </center>
                <hr><br>

                <fieldset>

                    <legend>Student Details</legend>

                    <label>Name :</label>
                    <input type="text" placeholder="Enter Name" required maxlength="30" autofocus>

                    <br><br>

                    <label>Email :</label>
                    <input type="email" placeholder="Enter Email" required>

                    <br><br>

                    <label>Password :</label>
                    <input type="password" placeholder="Enter Password" minlength="6" maxlength="12" required>

                    <br><br>

                    <label>Gender :</label>

                    <input type="radio" name="gender">Male
                    <input type="radio" name="gender">Female
                    <br><br>

                    <label>Degree :</label>

                    <input type="radio" name="d">B.E /B.Tech
                    <input type="radio" name="d">M.E/M.Tech
                    <input type="radio" name="d">B.sc /BCA/MCA
                    <input type="radio" name="d">Other science Degree

                    <br><br>

                    <label>College Name :</label>
                    <input type="text" placeholder="Your Answer" required>

                    <label>Skills :</label>

                    <input type="checkbox">HTML
                    <input type="checkbox">CSS
                    <input type="checkbox">Java

                    <br><br>

                    <label>State :</label>

                    <select required>

                        <option selected disabled>
                            choose
                        </option>

                        <option>Delhi</option>
                        <option>Tamil Nadu</option>
                        <option>Kerala</option>

                    </select>

                    <label>Year of passing :</label>

                    <select required>

                        <option selected disabled>
                            choose
                        </option>

                        <option>2024</option>
                        <option>2025</option>
                        <option>2026</option>

                    </select>

                    <br><br>

                    <label>Address :</label><br>

                    <textarea rows="4" cols="30" placeholder="Enter Address">
                    </textarea>

                </fieldset>
                <fieldset>
                    <Legend>Acknowledge</Legend>
                    <p>
                        Thank you.Your refgistration has been received.once again check your details , we will reach you shortly
                    </p>
                </fieldset>

                <br>

                <input type="submit" value="Register">

            </form>
        </div>
    </section>
</body>

</html>
