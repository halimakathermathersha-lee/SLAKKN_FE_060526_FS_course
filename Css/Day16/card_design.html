<!DOCTYPE html>
<html lang="en">
<head>

    <title>card</title>
    <link rel="stylesheet" href="css/card.css">
</head>

<body>

<div class="card-container">


    <div class="card">

        <img src="../Assets/img/product/5.jpg" alt="">

        <div class="card-content">

            <p>
                Natural skincare product with smooth hover zoom animation.
            </p>
        </div>

    </div>

    <div class="card">

        <img src="../Assets/img/product/7.webp" alt="">

        <div class="card-content">
            <h2>Modern Watch</h2>

    </div>


    <div class="card">

        <img src="../Assets/img/product/9.jpg" alt="">
