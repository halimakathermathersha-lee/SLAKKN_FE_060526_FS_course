<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simple Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css"/>


</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            Dashboard
        </div>

        <ul class="menu">
            <li><i class="fa-solid fa-house"></i> Home</li>
            <li><i class="fa-solid fa-chart-line"></i> Analytics</li>
            <li><i class="fa-solid fa-user"></i> Profile</li>
            <li><i class="fa-solid fa-gear"></i> Settings</li>
        </ul>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>Welcome John 👋</h1>

            <input type="text" placeholder="Search">

        </div>

        <!-- CARDS -->

        <div class="cards">

            <div class="card">
                <p>Total Sales</p>
                <h2>$25K</h2>
            </div>

            <div class="card">
                <p>Users</p>
                <h2>7,682</h2>
            </div>

            <div class="card">
                <p>Revenue</p>
                <h2>68%</h2>
            </div>

            <div class="card">
                <p>Orders</p>
                <h2>2,150</h2>
            </div>

        </div>

        <!-- CHART -->

        <div class="chart">

            <h2>Analytics Report</h2>

            <div class="graph"></div>

        </div>

    </div>

</div>

</body>
</html>
