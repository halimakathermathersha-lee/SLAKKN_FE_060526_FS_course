<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail</title>
    <link rel="stylesheet" href="css/thumbnail.css">
</head>

<body>
     <div class="card">
            <h3>
                Thumbnail
            </h3>
            <div class="thumb-grid">
                <div>
                    <img src="../Assets/img/thumbnail/1.jpg">
                </div>
                <div>
                    <div class="note">

                        <b>Note:</b>
                        This image tile will be used to represent
                        this course across all your academy landing pages.
                        <br>
                        Allowed formats:
                        .jpg, .png, .jpeg, .gif, .webp
                        <br>
                        Preferred minimum resolution:
                        480 * 270
                        <br>
                        Maximum size:
                        150kb
                    </div>
                    <button class="upload-btn">
                        Add Image
                    </button>
                </div>
            </div>
        </div>
</body>

</html>
