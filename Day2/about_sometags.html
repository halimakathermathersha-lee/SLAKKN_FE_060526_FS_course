<!-- 
 Formatting Tags
Formatting tags are used to change the style of text in HTML.
Examples:
<b>Bold</b>
<i>Italic</i>
<u>Underline</u>

Block Level Tags
Block level tags start in a new line and take full width.
Examples:
<div></div>
<p></p>
<h1></h1>

Block Level Tags → Closing Tag (CT)
These tags have both opening and closing tags.
Examples:
<div>Content</div>
<p>Hello</p>
<h1>Heading</h1>

Block Level Tags → Self Closing Tag (SCT)
These tags close by themselves.
Examples:
<hr><br>

Interactive Tags

Interactive tags are used for user interaction in HTML.

Block Level Interactive Tags

These tags start in a new line.

Closing Tag (CT)
<form></form>

<textarea></textarea>

<button></button>
Self Closing Tag (SCT)
<input>


Inline Level:Interactive Tags

These tags stay in same line.

Closing Tag (CT)
<button></button>

<label></label>

<select></select>

Self Closing Tag (SCT)
<input>

<option>
    
Semantic Tags

Semantic tags clearly describe the meaning of the content.

Examples:

<header></header>

<nav></nav>

<section></section>

<article></article>

<footer></footer>

Example:

<header>
  <h1>My Website</h1>
</header>

<section>
  <article>
    <p>This is a story.</p>
  </article>
</section>

<footer>
  <p>Thank You</p>
</footer>

Non Semantic Tags

Non semantic tags do not describe the meaning of content.

Examples:

<div></div>

<span></span>

Example:

<div>
  <span>Hello World</span>
</div> -->
